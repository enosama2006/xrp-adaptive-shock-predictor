name: XASP CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          ref: ci/verify-1.3.0-eight-hour-horizons

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: python -m pip install -q ruff==0.15.22

      - name: Apply safe Ruff fixes
        run: ruff check --fix src tests || true

      - name: Commit automatic fixes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src tests
            git commit -m "style: apply Ruff fixes"
            git push origin HEAD:ci/verify-1.3.0-eight-hour-horizons
          fi

      - name: Verify lint is clean
        run: ruff check src tests
