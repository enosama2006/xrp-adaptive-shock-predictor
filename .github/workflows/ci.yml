name: XASP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile all Python modules
        run: python -m compileall -q src tests

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src

      - name: Tests
        run: pytest --cov=xasp --cov-report=term-missing

      - name: Validate browser JavaScript syntax
        run: node --check app.js

      - name: Platform import smoke check
        run: |
          python - <<'PY'
          from xasp.platform_api import create_app
          from xasp.platform_runtime import PlatformStatus
          from xasp.platform_runtime_v2 import RealDataPlatformV2
          from xasp.future_envelope import build_future_envelope_targets
          from xasp.feature_registry import select_model_feature_names
          from xasp.pipeline import PipelineProgress
          print("XASP platform imports passed")
          PY
