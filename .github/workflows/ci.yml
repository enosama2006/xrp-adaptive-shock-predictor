name: XASP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile all Python modules
        run: python -m compileall -q src tests scripts

      - name: Capture Ruff report
        shell: bash
        run: |
          set +e
          ruff check src tests --output-format concise > "ruff-${{ matrix.python-version }}.txt" 2>&1
          status=$?
          cat "ruff-${{ matrix.python-version }}.txt"
          echo "$status" > "ruff-${{ matrix.python-version }}.status"
          exit 0

      - name: Upload Ruff report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-${{ matrix.python-version }}
          path: |
            ruff-${{ matrix.python-version }}.txt
            ruff-${{ matrix.python-version }}.status
          if-no-files-found: error

      - name: Enforce clean lint
        shell: bash
        run: test "$(cat 'ruff-${{ matrix.python-version }}.status')" = "0"

      - name: Capture type-check report
        shell: bash
        run: |
          set +e
          mypy --python-version "${{ matrix.python-version }}" src \
            > "mypy-${{ matrix.python-version }}.txt" 2>&1
          status=$?
          cat "mypy-${{ matrix.python-version }}.txt"
          echo "$status" > "mypy-${{ matrix.python-version }}.status"
          exit 0

      - name: Upload type-check report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-${{ matrix.python-version }}
          path: |
            mypy-${{ matrix.python-version }}.txt
            mypy-${{ matrix.python-version }}.status
          if-no-files-found: error

      - name: Enforce clean type check
        shell: bash
        run: test "$(cat 'mypy-${{ matrix.python-version }}.status')" = "0"

      - name: Capture test report
        shell: bash
        run: |
          set +e
          pytest --cov=xasp --cov-report=term-missing > "pytest-${{ matrix.python-version }}.txt" 2>&1
          status=$?
          cat "pytest-${{ matrix.python-version }}.txt"
          echo "$status" > "pytest-${{ matrix.python-version }}.status"
          exit 0

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: |
            pytest-${{ matrix.python-version }}.txt
            pytest-${{ matrix.python-version }}.status
          if-no-files-found: error

      - name: Validate browser JavaScript syntax
        run: |
          node --check app.js
          node --check governance.js
          node --check discovery.js
          node --check lab.js

      - name: Platform import smoke check
        run: |
          python - <<'PY'
          from xasp.feature_registry import select_model_feature_names
          from xasp.first_passage_discovery import build_first_passage_discovery
          from xasp.first_touch_v5 import train_first_touch_v5
          from xasp.future_envelope import build_future_envelope_targets
          from xasp.horizons import RESEARCH_HORIZONS_MINUTES
          from xasp.model_lab import ModelLabService
          from xasp.pipeline import PipelineProgress
          from xasp.platform_api import create_app
          from xasp.platform_runtime import PlatformStatus
          from xasp.platform_runtime_v2 import RealDataPlatformV2
          from xasp.price_store import PartitionedPriceStore

          assert RESEARCH_HORIZONS_MINUTES == (15, 30, 45, 60, 120, 180, 240, 480)
          print("XASP platform imports, empirical discovery, and model lab contract passed")
          PY

      - name: Enforce clean tests
        shell: bash
        run: test "$(cat 'pytest-${{ matrix.python-version }}.status')" = "0"
