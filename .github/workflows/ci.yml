name: XASP Mypy Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mypy-report:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -q -e ".[dev]"

      - name: Capture mypy report
        run: mypy src > mypy-report.txt || true

      - name: Upload mypy report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt

      - name: Verify types are clean
        run: grep -q "Success: no issues found" mypy-report.txt
