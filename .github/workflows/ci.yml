name: XASP Mypy Comment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -q -e ".[dev]"

      - name: Capture type-check output
        run: mypy src > mypy-output.txt || true

      - name: Publish type-check output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Mypy diagnostic'
            echo '```text'
            cat mypy-output.txt
            echo '```'
          } > mypy-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file mypy-comment.md

      - name: Verify types are clean
        run: grep -q "Success: no issues found" mypy-output.txt
