name: XASP Mypy Only

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -q -e ".[dev]"

      - name: Type check
        run: mypy src
