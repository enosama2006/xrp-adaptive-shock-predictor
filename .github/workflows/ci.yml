name: XASP CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          ref: ci/verify-1.3.0-eight-hour-horizons

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: python -m pip install -q ruff==0.15.22

      - name: Persist remaining lint findings
        run: |
          mkdir -p docs
          ruff check src tests --output-format=concise > docs/LINT_REMAINING.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/LINT_REMAINING.txt
          if ! git diff --cached --quiet; then
            git commit -m "ci: persist remaining lint findings"
            git push origin HEAD:ci/verify-1.3.0-eight-hour-horizons
          fi

      - name: Verify lint is clean
        run: test ! -s docs/LINT_REMAINING.txt
