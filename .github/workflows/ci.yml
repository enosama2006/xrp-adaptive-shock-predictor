name: XASP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile all Python modules
        run: python -m compileall -q src tests scripts

      - name: Lint
        run: ruff check src tests

      - name: Capture type-check report
        shell: bash
        run: |
          set +e
          mypy src > "mypy-${{ matrix.python-version }}.txt" 2>&1
          status=$?
          cat "mypy-${{ matrix.python-version }}.txt"
          echo "$status" > "mypy-${{ matrix.python-version }}.status"
          exit 0

      - name: Upload type-check report
        uses: actions/upload-artifact@v4
        with:
          name: mypy-${{ matrix.python-version }}
          path: |
            mypy-${{ matrix.python-version }}.txt
            mypy-${{ matrix.python-version }}.status
          if-no-files-found: error

      - name: Enforce clean type check
        shell: bash
        run: test "$(cat 'mypy-${{ matrix.python-version }}.status')" = "0"

      - name: Tests
        run: pytest --cov=xasp --cov-report=term-missing

      - name: Validate browser JavaScript syntax
        run: node --check app.js

      - name: Platform import smoke check
        run: |
          python - <<'PY'
          from xasp.feature_registry import select_model_feature_names
          from xasp.first_touch_v5 import train_first_touch_v5
          from xasp.future_envelope import build_future_envelope_targets
          from xasp.horizons import RESEARCH_HORIZONS_MINUTES
          from xasp.pipeline import PipelineProgress
          from xasp.platform_api import create_app
          from xasp.platform_runtime import PlatformStatus
          from xasp.platform_runtime_v2 import RealDataPlatformV2
          from xasp.price_store import PartitionedPriceStore

          assert RESEARCH_HORIZONS_MINUTES == (15, 30, 45, 60, 120, 180, 240, 480)
          print("XASP platform imports and eight-horizon contract passed")
          PY
