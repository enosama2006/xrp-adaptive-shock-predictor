name: XASP Patch Verification

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify-and-persist:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed patch when present
        shell: bash
        run: |
          if [ -f docs/xasp-fixes.patch ]; then
            git apply --check docs/xasp-fixes.patch
            git apply docs/xasp-fixes.patch
            rm docs/xasp-fixes.patch
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile all Python modules
        run: python -m compileall -q src tests

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src

      - name: Tests
        run: pytest --cov=xasp --cov-report=term-missing

      - name: Validate browser JavaScript syntax
        run: node --check app.js

      - name: Platform import smoke check
        run: |
          python - <<'PY'
          from xasp.platform_api import create_app
          from xasp.platform_runtime import PlatformStatus
          from xasp.platform_runtime_v2 import RealDataPlatformV2
          from xasp.future_envelope import build_future_envelope_targets
          from xasp.feature_registry import select_model_feature_names
          from xasp.pipeline import PipelineProgress
          print("XASP platform imports passed")
          PY

      - name: Persist verified changes to pull request branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix: resolve strict typing at external data boundaries"
            git push origin HEAD:${{ github.head_ref }}
          fi
