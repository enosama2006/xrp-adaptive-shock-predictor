name: XASP Diagnostic Bundle

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -q -e ".[dev]"

      - name: Capture exact type findings
        shell: bash
        run: |
          set +e
          mypy src > mypy-report.txt 2>&1
          status=$?
          cat mypy-report.txt
          echo "$status" > mypy-status.txt
          exit 0

      - name: Package checked-out source
        shell: bash
        run: git archive --format=tar.gz --output=xasp-source.tgz HEAD

      - name: Upload diagnostic bundle
        uses: actions/upload-artifact@v4
        with:
          name: xasp-diagnostic-bundle
          path: |
            mypy-report.txt
            mypy-status.txt
            xasp-source.tgz
          if-no-files-found: error
