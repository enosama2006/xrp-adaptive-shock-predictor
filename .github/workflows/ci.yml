name: XASP CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout verification branch
        uses: actions/checkout@v4
        with:
          ref: ci/verify-1.3.0-eight-hour-horizons

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: python -m pip install -q -e ".[dev]"

      - name: Persist mypy findings
        run: |
          mkdir -p docs
          mypy src > docs/MYPY_REMAINING.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/MYPY_REMAINING.txt
          if ! git diff --cached --quiet; then
            git commit -m "ci: persist mypy findings"
            git push origin HEAD:ci/verify-1.3.0-eight-hour-horizons
          fi

      - name: Verify types are clean
        run: grep -q "Success: no issues found" docs/MYPY_REMAINING.txt
