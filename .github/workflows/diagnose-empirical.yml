name: XASP Empirical Diagnostics

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: contains(github.event.issue.title, '[XASP-DIAG-1.6.0]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Diagnose and comment
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        shell: bash
        run: |
          set +e
          {
            echo '## Ruff'
            ruff check src tests --output-format concise
            echo
            echo '## mypy'
            mypy --python-version 3.11 src
            echo
            echo '## pytest'
            pytest -q
            echo
            echo '## JavaScript'
            node --check app.js
            node --check governance.js
            node --check discovery.js
          } > diagnostic.txt 2>&1
          {
            echo '```text'
            head -c 60000 diagnostic.txt
            echo
            echo '```'
          } > comment.md
          gh issue comment "$ISSUE_URL" --body-file comment.md
          exit 0
