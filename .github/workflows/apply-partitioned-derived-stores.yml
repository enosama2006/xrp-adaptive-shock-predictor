name: Apply Partitioned Derived Stores

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove generated tracked artifacts
        shell: bash
        run: |
          git rm -r -f --ignore-unmatch src/xasp.egg-info
          find src tests scripts -type d -name __pycache__ -print0 | while IFS= read -r -d '' directory; do
            git rm -r -f --ignore-unmatch "$directory"
            rm -rf "$directory"
          done
          git rm -f --ignore-unmatch .coverage
          rm -rf .pytest_cache .mypy_cache .ruff_cache

      - name: Apply streaming manifest optimization
        run: |
          python scripts/optimize_partitioned_stores.py
          rm scripts/optimize_partitioned_stores.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Normalize reviewed files
        run: |
          ruff check \
            src/xasp/partitioned_horizon_store.py \
            src/xasp/partitioned_anchor_builder.py \
            src/xasp/envelope_target_store.py \
            src/xasp/anchor_dataset.py \
            tests/test_partitioned_horizon_store.py \
            --fix
          ruff format \
            src/xasp/partitioned_horizon_store.py \
            src/xasp/partitioned_anchor_builder.py \
            src/xasp/envelope_target_store.py \
            src/xasp/anchor_dataset.py \
            tests/test_partitioned_horizon_store.py

      - name: Compile
        run: python -m compileall -q src tests scripts

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy --python-version 3.11 src

      - name: Tests
        run: pytest --cov=xasp --cov-report=term-missing

      - name: Browser JavaScript syntax
        run: |
          node --check app.js
          node --check governance.js

      - name: Persist verified optimization and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore
          git add src/xasp/partitioned_horizon_store.py
          git add src/xasp/partitioned_anchor_builder.py
          git add src/xasp/envelope_target_store.py
          git add src/xasp/anchor_dataset.py
          git add tests/test_partitioned_horizon_store.py
          git add -u
          git commit -m "storage: stream partition writes and remove generated artifacts"
          git push origin HEAD:${{ github.head_ref }}
