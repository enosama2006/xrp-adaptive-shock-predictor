name: Apply Partitioned Derived Stores

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply deterministic integration
        run: |
          python scripts/apply_partitioned_integration.py
          rm scripts/apply_partitioned_integration.py
          rm docs/partitioned-derived-stores.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Normalize reviewed files
        run: |
          ruff check \
            src/xasp/partitioned_horizon_store.py \
            src/xasp/partitioned_anchor_builder.py \
            src/xasp/envelope_target_store.py \
            src/xasp/anchor_dataset.py \
            src/xasp/pipeline.py \
            src/xasp/platform_runtime.py \
            src/xasp/extended_runtime.py \
            src/xasp/memory_safe_runtime.py \
            src/xasp/envelope_engine_v2.py \
            src/xasp/platform_runtime_v2.py \
            src/xasp/platform_api.py \
            tests/test_partitioned_horizon_store.py \
            tests/test_partitioned_anchor_builder.py \
            tests/test_envelope_target_store.py \
            --fix
          ruff format \
            src/xasp/partitioned_horizon_store.py \
            src/xasp/partitioned_anchor_builder.py \
            src/xasp/envelope_target_store.py \
            src/xasp/anchor_dataset.py \
            src/xasp/pipeline.py \
            src/xasp/platform_runtime.py \
            src/xasp/extended_runtime.py \
            src/xasp/memory_safe_runtime.py \
            src/xasp/envelope_engine_v2.py \
            src/xasp/platform_runtime_v2.py \
            src/xasp/platform_api.py \
            tests/test_partitioned_horizon_store.py \
            tests/test_partitioned_anchor_builder.py \
            tests/test_envelope_target_store.py

      - name: Compile
        run: python -m compileall -q src tests scripts

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy --python-version 3.11 src

      - name: Tests
        run: pytest --cov=xasp --cov-report=term-missing

      - name: Browser JavaScript syntax
        run: |
          node --check app.js
          node --check governance.js

      - name: Persist verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests pyproject.toml
          git add -u docs/partitioned-derived-stores.patch
          git add -u scripts/apply_partitioned_integration.py
          git commit -m "storage: integrate partitioned anchor and Model A target stores"
          git push origin HEAD:${{ github.head_ref }}
