name: Apply XASP Governance Integration

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed platform patch
        run: |
          git apply --check docs/platform-governance.patch
          git apply docs/platform-governance.patch
          rm docs/platform-governance.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall -q src tests scripts

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy --python-version 3.11 src

      - name: Capture test report
        shell: bash
        run: |
          set +e
          pytest --cov=xasp --cov-report=term-missing > pytest-governance.txt 2>&1
          status=$?
          cat pytest-governance.txt
          echo "$status" > pytest-governance.status
          exit 0

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-governance
          path: |
            pytest-governance.txt
            pytest-governance.status
          if-no-files-found: error

      - name: Enforce passing tests
        shell: bash
        run: test "$(cat pytest-governance.status)" = "0"

      - name: JavaScript syntax
        run: |
          node --check app.js
          node --check governance.js

      - name: Persist only reviewed platform changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/xasp/platform_api.py
          git add -u docs/platform-governance.patch
          git commit -m "api: wire governance evidence into platform"
          git push origin HEAD:${{ github.head_ref }}
