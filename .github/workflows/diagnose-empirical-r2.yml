name: XASP Empirical Diagnostics R2

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: contains(github.event.issue.title, '[XASP-DIAG-1.6.0-R3]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Comment Ruff fix diff
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        shell: bash
        run: |
          set +e
          ruff check src/xasp/window_selection.py --fix --diff > diagnostic.txt 2>&1
          {
            echo '### Ruff proposed fix'
            echo '```diff'
            cat diagnostic.txt
            echo
            echo '```'
          } > comment.md
          gh issue comment "$ISSUE_URL" --body-file comment.md
          exit 0
